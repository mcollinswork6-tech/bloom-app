<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Health - Login</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="firebase.js"></script>
</head>

<body
    style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: var(--space-xl);">

    <div class="container stack-xl" style="width: 100%; max-width: 400px; padding: 0;">

        <!-- Header -->
        <div style="text-align: center;" class="stack-md">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"
                style="color: var(--primary); margin: 0 auto; display: block;">
                <!-- Leaf / Bloom Icon -->
                <path d="M12 22v-7l-2-2"></path>
                <path d="M12 15l2-2"></path>
                <path d="M2.5 8C2.5 4 6.5 2 12 2c5.5 0 9.5 2 9.5 6 0 5-6.5 10.5-9.5 13-3-2.5-9.5-8-9.5-13z"></path>
            </svg>
            <h1 class="display-lg" style="font-size: 2.5rem;">Welcome back</h1>
            <p class="body-lg">Sign in to your digital sanctuary.</p>
        </div>

        <!-- Login Form -->
        <form class="layer-section stack-md" style="margin-bottom: 0;" action="index.html">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="input-soft" placeholder="hello@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="input-soft" placeholder="••••••••" required>
            </div>

            <div style="display: flex; flex-direction: column; gap: var(--space-md); margin-top: var(--space-xl);">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </div>
        </form>

        <!-- Secondary Actions -->
        <div style="text-align: center;" class="stack-md">
            <a href="#" class="label-md"
                style="text-decoration: none; color: var(--secondary); transition: color 0.2s ease;">Forgot
                Password?</a>
            <div style="margin-top: 1.5rem;">
                <span class="body-lg" style="font-size: 0.875rem;">Don't have an account? </span>
                <a href="signup.html" class="label-md" style="text-decoration: none; color: var(--primary);">Sign Up</a>
            </div>
        </div>

    </div>

</body>

</html>
